<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nexalyze 53 Firebase</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:rgba(255,255,255,.05);backdrop-filter:blur(20px)}
.glass{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:18px}
.container{max-width:1000px;margin:auto;padding:20px}
input,textarea{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px}
button{padding:14px 20px;border:none;border-radius:12px;cursor:pointer}
#result{white-space:pre-wrap;padding:20px;margin-top:20px}
</style>
</head>
<body>
<header>
<h2>Nexalyze</h2>
<div>
<span id="credits">0</span> Credits
<button id="loginBtn">Login with Google</button>
<button id="logoutBtn">Logout</button>
</div>
</header>

<div class="container">
<div class="glass" style="padding:20px">
<h2>Analyze / Generate</h2>
<input id="promptInput" placeholder="Paste YouTube link or write your request..." />
<button onclick="runGemini()">Analyze / Generate (-1 Credit)</button>
<div id="result" class="glass"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAs7vH26hn7hNNdvH7kJpnPWIgncmRy8_8",
  authDomain: "nexalyze-d6673.firebaseapp.com",
  projectId: "nexalyze-d6673",
  storageBucket: "nexalyze-d6673.firebasestorage.app",
  messagingSenderId: "207885452455",
  appId: "1:207885452455:web:3c54c725130fdf40478782",
  measurementId: "G-3W7956W9FN"
};

const GEMINI_API_KEY = "AQ.Ab8RN6JU600QgpsSZTGGSQiC0tU6KnRCrLYK5j8k7T5RswWgCw";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let currentCredits = 0;

async function syncUser(user){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      name:user.displayName,
      email:user.email,
      credits:5
    });
    currentCredits = 5;
  } else {
    currentCredits = snap.data().credits || 0;
  }
  document.getElementById("credits").innerText = currentCredits;
}

document.getElementById("loginBtn").onclick = async ()=>{
  const res = await signInWithPopup(auth,provider);
  currentUser = res.user;
};

document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
};

onAuthStateChanged(auth, async(user)=>{
  if(user){
    currentUser = user;
    await syncUser(user);
  } else {
    currentUser = null;
    currentCredits = 0;
    document.getElementById("credits").innerText = "0";
  }
});

window.runGemini = async function(){
  if(!currentUser){
    alert("Login first");
    return;
  }

  if(currentCredits <= 0){
    alert("رصيدك انتهى، لازم تشحن.");
    return;
  }

  const prompt = document.getElementById("promptInput").value.trim();
  if(!prompt){
    alert("اكتب طلبك");
    return;
  }

  currentCredits--;
  document.getElementById("credits").innerText = currentCredits;

  await updateDoc(doc(db,"users",currentUser.uid),{
    credits: currentCredits
  });

  document.getElementById("result").innerText = "Loading...";

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      contents:[{
        parts:[{text:prompt}]
      }]
    })
  });

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
  document.getElementById("result").innerText = text;
}
</script>
</body>
</html>
